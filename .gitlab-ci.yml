stages:
  - lint
  - build
  - test
  - release

lint:
  image: registry.furqansoftware.net/cardboard/golang:1.25.5-bullseye-1
  stage: lint
  script:
    - task lint:tools:install
    - task lint
  rules:
    - changes:
        - "**/*.go"
        - .gitlab-ci.yml
        - Taskfile.yml
    - if: "$CI_COMMIT_TAG"
  cache:
    key: go
    paths:
      - ".go-build"
  interruptible: true

build:
  image: registry.furqansoftware.net/cardboard/golang:1.25.5-bullseye-1
  stage: build
  script:
    - go build -o printd .
  rules:
    - changes:
        - "**/*.go"
        - .gitlab-ci.yml
        - Taskfile.yml
    - if: "$CI_COMMIT_TAG"
  artifacts:
    expire_in: 3 hours
    paths:
      - printd
  cache:
    key: go
    paths:
      - ".go-build"
  interruptible: true

test:
  image: registry.furqansoftware.net/cardboard/golang:1.25.5-bullseye-1
  stage: test
  script:
    - task test
  rules:
    - changes:
        - "**/*.go"
        - .gitlab-ci.yml
        - Taskfile.yml
    - if: "$CI_COMMIT_TAG"
  needs:
    - build
  cache:
    key: go
    paths:
      - ".go-build"
    policy: pull
  interruptible: true

release:
  stage: release
  image:
    name: registry.furqansoftware.net/cardboard/golang:1.25.5-bullseye-1
  variables:
    GIT_DEPTH: 0
  script:
    - task goreleaser:install goversioninfo:install
    - goreleaser release --clean `if [[ "$CI_COMMIT_TAG" == "" ]]; then echo --skip=publish --snapshot; fi`
  artifacts:
    expire_in: 3 hours
    paths:
      - dist/
